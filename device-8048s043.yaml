# ESP32-S3 8048S043 — 4.3" 800×480 RGB display board (ST7262 / IPS panel)
# Touch: GT911 capacitive (I2C)
# Backlight: GPIO2 (PWM via LEDC)
# Requires ESPHome 2023.11+ for rpi_dpi_rgb + LVGL support
# Flash: 16MB  PSRAM: 8MB OPI
#
# Pin reference source:
#   https://github.com/HazemBenAmmar/ESP32_Display_development_board/tree/main/
#   4.3/4.3inch_ESP32-8048S043/4.3inch_ESP32-8048S043/1-Demo/Demo_Arduino/
#   3_3-1_TFT_HelloWorld/HelloWorld/HelloWorld.ino
#   3_3-4_TFT-LVGL-Widgets/LvglWidgets/touch.h
#
# RGB timing reference: Arduino_RPi_DPI_RGBPanel constructor in demo source:
#   width=800, hsync_front_porch=8, hsync_pulse_width=4, hsync_back_porch=8
#   height=480, vsync_front_porch=8, vsync_pulse_width=4, vsync_back_porch=8
#   pclk_active_neg=1, prefer_speed=16000000 (16 MHz)

esphome:
  name: esp32-8048s043
  friendly_name: ESP32 8048S043

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # 64 KB data cache required for RGB framebuffer DMA
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      # Keep firmware and read-only data in PSRAM to free IRAM
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      # Extend watchdog to avoid resets during heavy display operations
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
  partitions: partitions.csv

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32-8048S043-AP"
    password: "esp32display"

captive_portal:

ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: INFO

# ─── Backlight (GPIO2, PWM) ───────────────────────────────────────────────────
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO2

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# ─── 4.3" 800×480 RGB Parallel Display (ST7262) ──────────────────────────────
# Control pins
#   DE    → GPIO40
#   VSYNC → GPIO41
#   HSYNC → GPIO39
#   PCLK  → GPIO42
#
# RGB data pins (LSB → MSB order as required by rpi_dpi_rgb)
#   R0=45  R1=48  R2=47  R3=21  R4=14
#   G0=5   G1=6   G2=7   G3=15  G4=16  G5=4
#   B0=8   B1=3   B2=46  B3=9   B4=1
display:
  - platform: rpi_dpi_rgb
    id: main_display
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 16MHz
    pclk_inverted: true          # pclk_active_neg=1 in reference demo
    dimensions:
      width: 800
      height: 480
    de_pin:
      number: GPIO40
    hsync_pin:
      number: GPIO39
    vsync_pin:
      number: GPIO41
    pclk_pin: GPIO42
    hsync_back_porch: 8
    hsync_front_porch: 8
    hsync_pulse_width: 4
    vsync_back_porch: 8
    vsync_front_porch: 8
    vsync_pulse_width: 4
    data_pins:
      red:
        - 45   # R0 LSB
        - 48   # R1
        - 47   # R2
        - 21   # R3
        - 14   # R4 MSB
      green:
        - 5    # G0 LSB
        - 6    # G1
        - 7    # G2
        - 15   # G3
        - 16   # G4
        - 4    # G5 MSB
      blue:
        - 8    # B0 LSB
        - 3    # B1
        - 46   # B2
        - 9    # B3
        - 1    # B4 MSB

# ─── GT911 Capacitive Touch ──────────────────────────────────────────────────
# SDA=GPIO19  SCL=GPIO20  INT=not connected (-1)  RST=GPIO38
i2c:
  - id: i2c_touch
    sda: GPIO19
    scl: GPIO20
    frequency: 400kHz

touchscreen:
  - platform: gt911
    id: touch_screen
    i2c_id: i2c_touch
    interrupt_pin:
      number: GPIO18     # INT — leave floating / pull-up; omit block entirely if unconnected
      ignore_strapping_warning: true
    reset_pin:
      number: GPIO38

# ─── LVGL UI ─────────────────────────────────────────────────────────────────
lvgl:
  displays:
    - main_display
  touchscreens:
    - touch_screen
  color_depth: 16
  bg_color: 0x1a1a2e
  pages:
    - id: main_page
      widgets:
        - label:
            id: status_label
            text: "ESP32-8048S043 Ready"
            text_color: 0xffffff
            align: CENTER
