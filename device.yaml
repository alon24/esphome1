# ESP32-S3 8048S043 — 4.3" 800×480 RGB display board
esphome:
  name: esp32-display
  friendly_name: ESP32 Display
  on_boot:
    priority: -100
    then:
      - delay: 500ms
      - lambda: maindashboard_create(id(dashboard_page).obj);
  platformio_options:
    upload_speed: 921600
    build_flags:
      - -DLV_USE_PNG=1
      - -DLV_USE_SJPG=1
      - -DLV_USE_BMP=1
      - -DLV_FONT_MONTSERRAT_12=1
      - -DLV_FONT_MONTSERRAT_14=1
      - -DLV_FONT_MONTSERRAT_16=1
      - -DLV_FONT_MONTSERRAT_18=1
      - -DLV_FONT_MONTSERRAT_20=1
      - -DLV_FONT_MONTSERRAT_22=1
      - -DLV_FONT_MONTSERRAT_24=1
      - -DLV_FONT_MONTSERRAT_26=1
      - -DLV_FONT_MONTSERRAT_32=1
      - -DLV_FONT_MONTSERRAT_48=1
  libraries:
    - "LovyanGFX"
    - "ArduinoJson@7.3.0"
  includes:
    - custom/grid_config.h
    - custom/ui_helpers.h
    - custom/wifi_setup.h
    - custom/system_settings.h
    - custom/version_info.h
    - custom/stb_image.h
    - custom/widget_bindings.h
    - custom/tab_home.h
    - custom/tab_settings.h
    - custom/tab_wifi.h
    - custom/tab_wifi_embedded.h
    - custom/tab_sd.h
    - custom/tab_sd_embedded.h
    - custom/maindashboard.h
    - custom/slideshow.h

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: 5.5.4
    sdkconfig_options:
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_VFS_SUPPORT_IO: "y"
      CONFIG_VFS_SUPPORT_DIR: "y"
      CONFIG_VFS_SUPPORT_POSIX: "y"
      CONFIG_VFS_SUPPORT_FATFS: "y"
      CONFIG_FATFS_USE_FASTSEEK: "y"
      CONFIG_FATFS_LFN_HEAP: "y"
      CONFIG_FATFS_MAX_LFN: "255"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
    advanced:
      loop_task_stack_size: 32768
  partitions: partitions.csv

psram:
  mode: octal
  speed: 80MHz

wifi:
  id: wifi_module
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  reboot_timeout: 15min
  ap:
    ssid: "GridOS-Setup"
    password: ""
    ap_timeout: 1min

logger:
  level: INFO
  baud_rate: 115200
  hardware_uart: UART0

web_server:
  port: 81 # Move standard web server to 81 so React SPA can have 80
  version: 3

ota:
  - platform: esphome
    password: !secret ota_password

captive_portal:

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client
  reboot_timeout: 0s
  keepalive: 60s
  on_connect:
    - lambda: |-
        ESP_LOGI("MQTT", "Connected to broker!");
  on_disconnect:
    - lambda: |-
        ESP_LOGW("MQTT", "Disconnected from broker");
  on_message:
    - topic: "system/display/navigation"
      then:
        - lambda: |-
            if (x == "home") ui_navigate_to("main");
            else ui_navigate_to(x.c_str());

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip
      on_value:
        then:
          - lambda: |-
              ESP_LOGI("wifi", "IP ADDRESS ASSIGNED: %s", x.c_str());
              ui_set_connected(x.c_str());

globals:
  - id: pref_ss_timeout
    type: int
    initial_value: '15000'
  - id: pref_ss_interval
    type: int
    initial_value: '5000'
  - id: pref_ss_enabled
    type: bool
    initial_value: 'false'

display:
  - platform: lovyan_verified
    id: main_display
    width: 800
    height: 480
    update_interval: 16ms

i2c:
  sda: 19
  scl: 20
  scan: true
  frequency: 400kHz

touchscreen:
  - platform: gt911
    id: main_touch
    display: main_display
    address: 0x5D
    reset_pin: GPIO38



lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  update_interval: 30ms
  buffer_size: 25%
  byte_order: little_endian
  bg_color: 0x0e0e0e
  default_font: MONTSERRAT_24
  msgboxes:
    - id: discovery_mbox
      title: {text: "Test"}
      body: {text: "Test Body"}
  pages:
    - id: dashboard_page
    - id: discovery_page
      widgets:
        - label: {text: "f12", text_font: MONTSERRAT_12}
        - label: {text: "f14", text_font: MONTSERRAT_14}
        - label: {text: "f16", text_font: MONTSERRAT_16}
        - label: {text: "f20", text_font: MONTSERRAT_20}
        - label: {text: "f22", text_font: MONTSERRAT_22}
        - button:
            text: "f"
        - checkbox:
        - dropdown:
            options: ["a", "b"]
        - roller:
            options: ["a", "b"]
        - bar:
        - slider: {}
        - arc: {}
        - switch:
        - textarea:
        - keyboard:
        - keyboard:
        - obj: # For flex layout activation
            layout:
              type: flex
              flex_flow: row
            widgets: []

esp_littlefs:
  id: littlefs_bridge

time:
  - platform: sntp
    id: sntp_time
    timezone: "IST-2IDT,M3.4.4/26,M10.5.0"

interval:
  - interval: 1s
    then:
      - lambda: |-
          slideshow_tick();
          grid_config_tick();
          auto now = id(sntp_time).now();
          dashboard_tick(now.hour, now.minute, now.second, now.day_of_month, now.month, now.year, now.day_of_week);
          if (now.second % 5 == 0) ESP_LOGI("main", "--- LIVE HEARTBEAT ---");
          // Sync header WiFi status automatically
          if (!id(wifi_module).is_connected()) {
            ui_set_disconnected();
          }

external_components:
  - source:
      type: local
      path: components
    components: [react_spa, sd_card, esp_littlefs]
  - source:
      type: local
      path: external_components
    components: [lovyan_verified]

sd_card:

react_spa:
  id: my_react_spa
  port: 80
