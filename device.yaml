# ─── SNTP Time ───────────────────────────────────────────────────────────────
time:
  - platform: sntp
    id: sntp_time
    timezone: "UTC"

# ─── Intervals ────────────────────────────────────────────────────────────────
interval:
  - interval: 30s
    then:
      - lambda: 'ESP_LOGI("FW", ">>> FIRMWARE VERSION: %s <<<", FW_VERSION_STR);'

  - interval: 1s
    then:
      - lambda: |-
          auto t = id(sntp_time).now();
          if (t.is_valid())
            dashboard_tick(t.hour, t.minute, t.second,
                           t.day_of_month, t.month, t.year,
                           t.day_of_week);
          else
            dashboard_tick(-1, -1, -1, -1, -1, -1, -1);

# ─── React SPA web server (port 80) ──────────────────────────────────────────
external_components:
  - source:
      type: local
      path: components
    components: [react_spa, sd_card]

sd_card:

react_spa:
  port: 80
