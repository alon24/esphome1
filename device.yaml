# ESP32-S3 8048S043 — 4.3" 800×480 RGB display board
# Requires ESPHome 2023.11+ for rpi_dpi_rgb + LVGL support
# Flash: 16MB  PSRAM: 8MB OPI

esphome:
  name: esp32-display
  friendly_name: ESP32 Display
  platformio_options:
    upload_speed: 921600
  includes:
    - custom/wifi_setup.h
    - custom/screen_tests.h
    - custom/ui.h
  on_boot:
    - priority: -200
      then:
        - lambda: 'ui_init();'
        - delay: 3s

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIFFS_ENABLED: "y"
      CONFIG_SPIFFS_USE_MAGIC: "y"
      CONFIG_SPIFFS_USE_MAGIC_LENGTH: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_LCD_RGB_RESTART_IN_VSYNC: "y"
  partitions: partitions.csv

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32-Display-AP"
    password: "esp32display"
  on_connect:
    - lambda: |-
        esp_netif_ip_info_t ip_info;
        esp_netif_t *netif = esp_netif_get_handle_from_ifkey("WIFI_STA_DEF");
        char ip_str[16] = "";
        if (netif && esp_netif_get_ip_info(netif, &ip_info) == ESP_OK)
          snprintf(ip_str, sizeof(ip_str), IPSTR, IP2STR(&ip_info.ip));
        ui_set_connected(ip_str);
  on_disconnect:
    - lambda: 'ui_set_disconnected();'

captive_portal:

ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: INFO


# ─── Backlight ───────────────────────────────────────────────────────────────
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO2

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# ─── 4.3" 800×480 RGB Parallel Display (ST7262) ─────────────────────────────
display:
  - platform: mipi_rgb
    model: RPI
    id: main_display
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 18MHz
    pclk_inverted: true
    dimensions:
      width: 800
      height: 480
    de_pin:
      number: GPIO40
    hsync_pin:
      number: GPIO39
    vsync_pin:
      number: GPIO41
    pclk_pin: GPIO42
    hsync_back_porch: 8
    hsync_front_porch: 8
    hsync_pulse_width: 4
    vsync_back_porch: 8
    vsync_front_porch: 8
    vsync_pulse_width: 4
    data_pins:
      red:
        - 14   # R4 MSB
        - 21   # R3
        - 47   # R2
        - 48   # R1
        - 45   # R0 LSB
      green:
        - 4    # G5 MSB
        - 16   # G4
        - 15   # G3
        - 7    # G2
        - 6    # G1
        - 5    # G0 LSB
      blue:
        - 1    # B4 MSB
        - 9    # B3
        - 46   # B2
        - 3    # B1
        - 8    # B0 LSB

# ─── GT911 Capacitive Touch ──────────────────────────────────────────────────
i2c:
  - id: i2c_touch
    sda: GPIO19
    scl: GPIO20
    frequency: 400kHz

touchscreen:
  - platform: gt911
    id: touch_screen
    i2c_id: i2c_touch
    reset_pin: GPIO38

# ─── LVGL UI ─────────────────────────────────────────────────────────────────
lvgl:
  displays:
    - main_display
  touchscreens:
    - touch_screen
  color_depth: 16
  bg_color: 0x1a1a2e
  default_font: MONTSERRAT_24
  full_refresh: true
  pages:
    - id: main_page
      widgets:
        # Off-screen dummies — force ESPHome to compile label/textarea/keyboard/btn modules
        - label:
            text: ""
            x: -200
            y: -200
        - button:
            x: -200
            y: -200
            width: 1
            height: 1
            widgets:
              - label:
                  text: ""
        - textarea:
            id: _dummy_ta
            x: -200
            y: -200
            width: 1
            height: 1
        - keyboard:
