# ESP32-S3 8048S043 — 4.3" 800×480 RGB display board
# Requires ESPHome 2023.11+ for rpi_dpi_rgb + LVGL support
# Flash: 16MB  PSRAM: 8MB OPI

esphome:
  name: esp32-display
  friendly_name: ESP32 Display
  platformio_options:
    upload_speed: 921600
    build_flags:
      - -I${sysenv.IDF_PATH}/components/vfs/include
      - -I${sysenv.IDF_PATH}/components/sdmmc/include
      - -I${sysenv.IDF_PATH}/components/fatfs/vfs
      - -I${sysenv.IDF_PATH}/components/driver/include
      - -I${sysenv.IDF_PATH}/components/spi_flash/include
      - -DLV_USE_PNG=1
      - -DLV_USE_SJPG=1
      - -DLV_USE_BMP=1
      - -DCORE_DEBUG_LEVEL=3
  includes:
    - custom/ui_helpers.h
    - custom/wifi_setup.h
    - custom/version_info.h
    # - custom/test_screen.h
    # app pages (4-tab dashboard)
    - custom/tab_home.h
    - custom/tab_settings.h
    - custom/tab_wifi.h
    # - custom/sd_card.h
    # - custom/slideshow.h
    # - custom/media_screen.h
    - custom/tab_sd.h
    - custom/maindashboard.h
  on_boot:
    - priority: -200
      then:
        - lambda: |-
            maindashboard_create();
            for (int i = 0; i < 10; i++)
              ESP_LOGI("FW", ">>> FIRMWARE VERSION: %s <<<", FW_VERSION_STR);

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIFFS_ENABLED: "y"
      CONFIG_SPIFFS_USE_MAGIC: "y"
      CONFIG_SPIFFS_USE_MAGIC_LENGTH: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_LCD_RGB_RESTART_IN_VSYNC: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"
      CONFIG_VFS_SUPPORT_IO: "y"
      CONFIG_VFS_SUPPORT_DIR: "y"
      CONFIG_VFS_SUPPORT_POSIX: "y"
      CONFIG_VFS_SUPPORT_FATFS: "y"
      CONFIG_FATFS_USE_FASTSEEK: "y"
      CONFIG_HAVE_SDSPI: "y"
      CONFIG_ESP_CONSOLE_UART: "y"
      CONFIG_ESP_CONSOLE_UART_NUM: "0"
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG_ENABLED: "n"
  partitions: partitions.csv

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32-Display-AP"
    password: "esp32display"
  on_connect:
    - lambda: |-
        esp_netif_ip_info_t ip_info;
        esp_netif_t *netif = esp_netif_get_handle_from_ifkey("WIFI_STA_DEF");
        char ip_str[16] = "";
        if (netif && esp_netif_get_ip_info(netif, &ip_info) == ESP_OK)
          snprintf(ip_str, sizeof(ip_str), IPSTR, IP2STR(&ip_info.ip));
        ui_set_connected(ip_str);
        esp_wifi_set_mode(WIFI_MODE_APSTA);  // Keep AP active alongside STA
  on_disconnect:
    - lambda: 'ui_set_disconnected();'

captive_portal:

ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: DEBUG
  baud_rate: 115200
  hardware_uart: UART0
  logs:
    wifi: ERROR
    wifi_esp32: ERROR
    api: ERROR
    api.connection: ERROR
    ota: ERROR
    esphome.ota: ERROR
    mdns: ERROR
    safe_mode: ERROR
    i2c.idf: ERROR
    gt911.touchscreen: ERROR
    lvgl: ERROR
    display.mipi_rgb: ERROR
    light: ERROR
    ledc.output: ERROR
    psram: ERROR
    component: ERROR
    scheduler: ERROR
    app: ERROR
    logger: ERROR


# ─── Backlight ───────────────────────────────────────────────────────────────
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO2

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

image:
  - file: resources/testscreen.png
    id: dummy_png
    type: RGB
    resize: 10x10

# ─── 4.3" 800×480 RGB Parallel Display (ST7262) ─────────────────────────────
display:
  - platform: mipi_rgb
    model: RPI
    id: main_display
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 18MHz
    pclk_inverted: true
    dimensions:
      width: 800
      height: 480
    de_pin:
      number: GPIO40
    hsync_pin:
      number: GPIO39
    vsync_pin:
      number: GPIO41
    pclk_pin: GPIO42
    hsync_back_porch: 8
    hsync_front_porch: 8
    hsync_pulse_width: 4
    vsync_back_porch: 8
    vsync_front_porch: 8
    vsync_pulse_width: 4
    data_pins:
      red:
        - 45   # R0 LSB
        - 48   # R1
        - 47   # R2
        - 21   # R3
        - 14   # R4 MSB
      green:
        - 5    # G0 LSB
        - 6    # G1
        - 7    # G2
        - 15   # G3
        - 16   # G4
        - 4    # G5 MSB
      blue:
        - 8    # B0 LSB
        - 3    # B1
        - 46   # B2
        - 9    # B3
        - 1    # B4 MSB

# ─── GT911 Capacitive Touch ──────────────────────────────────────────────────
i2c:
  - id: i2c_touch
    sda: GPIO19
    scl: GPIO20
    frequency: 400kHz

touchscreen:
  - platform: gt911
    id: touch_screen
    i2c_id: i2c_touch
    reset_pin: GPIO38

# ─── LVGL UI ─────────────────────────────────────────────────────────────────
lvgl:
  displays:
    - main_display
  touchscreens:
    - touch_screen
  color_depth: 16
  byte_order: big_endian
  bg_color: 0x0e0e0e
  default_font: MONTSERRAT_24
  full_refresh: true
  pages:
    - id: main_page
      widgets:
        # Off-screen dummies — force ESPHome to compile label/textarea/keyboard/btn modules
        - label:
            text: ""
            x: -200
            y: -200
        - button:
            x: -200
            y: -200
            width: 1
            height: 1
            widgets:
              - label:
                  text: ""
        - textarea:
            id: _dummy_ta
            x: -200
            y: -200
            width: 1
            height: 1
        - keyboard:
