# ESP32-S3 8048S043 — 4.3" 800×480 RGB display board
esphome:
  name: esp32-display
  friendly_name: ESP32 Display
  platformio_options:
    upload_speed: 921600
    build_flags:
      - -DLV_USE_PNG=1
      - -DLV_USE_SJPG=1
      - -DLV_USE_BMP=1
      - -DLV_FONT_MONTSERRAT_12=1
      - -DLV_FONT_MONTSERRAT_14=1
      - -DLV_FONT_MONTSERRAT_16=1
      - -DLV_FONT_MONTSERRAT_18=1
      - -DLV_FONT_MONTSERRAT_20=1
      - -DLV_FONT_MONTSERRAT_22=1
      - -DLV_FONT_MONTSERRAT_24=1
      - -DLV_FONT_MONTSERRAT_26=1
      - -DLV_FONT_MONTSERRAT_32=1
      - -DLV_FONT_MONTSERRAT_48=1
      - -DLV_USE_TEXTAREA=1
      - -DLV_USE_KEYBOARD=1
      - -DLV_USE_BTNMATRIX=1
      - -DLV_USE_LABEL=1
      - -DLV_USE_BTN=1
      - -DLV_USE_BAR=1
      - -DLV_USE_IMG=1
      - -DLV_USE_LINE=1
      - -DLV_USE_MSGBOX=1
      - -DLV_USE_FLEX=1
      - -DLV_USE_SLIDER=1
      - -DLV_USE_SWITCH=1
      - -DLV_USE_CHECKBOX=1
      - -DLV_USE_CHART=1
  libraries:
    - "LovyanGFX"
    - "ArduinoJson@7.3.0"
  includes:
    - custom/ui_helpers.h
    - custom/wifi_setup.h
    - custom/version_info.h
    - custom/stb_image.h
    - custom/tab_home.h
    - custom/tab_settings.h
    - custom/tab_wifi.h
    - custom/tab_sd.h
    - custom/grid_config.h
    - custom/maindashboard.h
    - custom/screensaver.h
  on_boot:
    - priority: 100
      then:
        - lambda: |-
            maindashboard_create(); 
            ESP_LOGI("main", "Dashboard Started - Diagnostic Revert Complete");

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_VFS_SUPPORT_IO: "y"
      CONFIG_VFS_SUPPORT_DIR: "y"
      CONFIG_VFS_SUPPORT_POSIX: "y"
      CONFIG_VFS_SUPPORT_FATFS: "y"
      CONFIG_FATFS_USE_FASTSEEK: "y"
      CONFIG_FATFS_LFN_HEAP: "y"
      CONFIG_FATFS_MAX_LFN: "255"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
  partitions: partitions.csv

psram:
  mode: octal
  speed: 80MHz

wifi:
  id: wifi_module
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  ap:
    ssid: "ESP32-S3 Display AP"
  reboot_timeout: 0s 

logger:
  level: INFO
  baud_rate: 115200
  hardware_uart: UART0

captive_portal:
  
text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip
      on_value:
        then:
          - lambda: |-
              ESP_LOGI("wifi", "IP ADDRESS ASSIGNED: %s", x.c_str());
              ui_set_connected(x.c_str());

globals:
  - id: pref_ss_timeout
    type: int
    initial_value: '15000'
  - id: pref_ss_interval
    type: int
    initial_value: '5000'
  - id: pref_ss_enabled
    type: bool
    initial_value: 'false'

display:
  - platform: lovyan_verified
    id: main_display
    width: 800
    height: 480
    update_interval: 0ms

i2c:
  sda: 19
  scl: 20
  scan: true

touchscreen:
  - platform: gt911
    id: main_touch
    display: main_display
    address: 0x5D
    reset_pin: GPIO38
    on_touch:
      - lambda: screensaver_refresh_activity();

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  update_interval: 0ms
  buffer_size: 25%
  byte_order: little_endian
  bg_color: 0x0e0e0e
  default_font: MONTSERRAT_24
  pages:
    - id: dashboard_page
      on_boot:
        - lambda: maindashboard_create();

time:
  - platform: sntp
    id: sntp_time
    timezone: "IST-2IDT,M3.4.4/26,M10.5.0"

interval:
  - interval: 1s
    then:
      - lambda: |-
          screensaver_tick(); 
          auto now = id(sntp_time).now();
          dashboard_tick(now.hour, now.minute, now.second, now.day_of_month, now.month, now.year, now.day_of_week);
          if (now.second % 5 == 0) ESP_LOGI("main", "--- LIVE HEARTBEAT ---");
          // Sync header WiFi status automatically
          if (!id(wifi_module).is_connected()) {
            ui_set_disconnected();
          }

external_components:
  - source:
      type: local
      path: components
    components: [react_spa, sd_card]
  - source:
      type: local
      path: external_components
    components: [lovyan_verified]

sd_card:
react_spa:
  port: 80
