# ESP32-S3 8048S043 — 4.3" 800×480 RGB display board
# Requires ESPHome 2023.11+ for rpi_dpi_rgb + LVGL support
# Flash: 16MB  PSRAM: 8MB OPI

esphome:
  name: esp32-display
  friendly_name: ESP32 Display
  platformio_options:
    upload_speed: 921600
    build_flags:
      - -DLV_USE_PNG=1
      - -DLV_USE_SJPG=1
      - -DLV_USE_BMP=1
      - -DLV_FONT_MONTSERRAT_12=1
      - -DLV_FONT_MONTSERRAT_14=1
      - -DLV_FONT_MONTSERRAT_16=1
      - -DLV_FONT_MONTSERRAT_18=1
      - -DLV_FONT_MONTSERRAT_20=1
      - -DLV_FONT_MONTSERRAT_22=1
      - -DLV_FONT_MONTSERRAT_24=1
      - -DLV_FONT_MONTSERRAT_26=1
      - -DLV_FONT_MONTSERRAT_48=1
      - -DLV_USE_TEXTAREA=1
      - -DLV_USE_KEYBOARD=1
      - -DLV_USE_BTNMATRIX=1
      - -DLV_USE_LABEL=1
      - -DLV_USE_BTN=1
      - -DLV_USE_BAR=1
      - -DLV_USE_IMG=1
      - -DLV_USE_LINE=1
  libraries:
    - "LovyanGFX"
  includes:
    - custom/ui_helpers.h
    - custom/wifi_setup.h
    - custom/version_info.h
    - custom/stb_image.h
    - custom/tab_home.h
    - custom/tab_settings.h
    - custom/tab_wifi.h
    - custom/tab_sd.h
    - custom/maindashboard.h
  on_boot:
    - priority: -200
      then:
        - lambda: |-
            maindashboard_create(); 
            ESP_LOGI("main", "Dashboard Started");

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIFFS_ENABLED: "y"
      CONFIG_SPIFFS_USE_MAGIC: "y"
      CONFIG_SPIFFS_USE_MAGIC_LENGTH: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_LCD_RGB_RESTART_IN_VSYNC: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"
      CONFIG_VFS_SUPPORT_IO: "y"
      CONFIG_VFS_SUPPORT_DIR: "y"
      CONFIG_VFS_SUPPORT_POSIX: "y"
      CONFIG_VFS_SUPPORT_FATFS: "y"
      CONFIG_FATFS_USE_FASTSEEK: "y"
      CONFIG_FATFS_LFN_NONE: "n"
      CONFIG_FATFS_LFN_HEAP: "y"
      CONFIG_FATFS_LFN_HEAP_INTERNAL: "n"
      CONFIG_FATFS_MAX_LFN: "255"
      CONFIG_FATFS_CODEPAGE_437: "y"
      CONFIG_FATFS_SECTOR_512: "y"
      CONFIG_FATFS_SECTOR_4096: "n"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_HAVE_SDSPI: "y"
      CONFIG_ESP_CONSOLE_UART: "y"
      CONFIG_ESP_CONSOLE_UART_NUM: "0"
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG_ENABLED: "n"
  partitions: partitions.csv

psram:
  mode: octal
  speed: 80MHz

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  ap:
    ssid: "ESP32-S3 Display AP"
    password: "password"
  reboot_timeout: 0s # No reboot on wifi failure for test
  on_connect:
    - lambda: |-
        ui_set_connected(id(wifi_ip).state.c_str());
  on_disconnect:
    - lambda: 'ui_set_disconnected();'

captive_portal:

ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: INFO
  baud_rate: 115200
  hardware_uart: UART0


# ─── Backlight ───────────────────────────────────────────────────────────────
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO2

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

image:
  - file: resources/testscreen.png
    id: dummy_png
    type: RGB
    resize: 10x10

# ─── LovyanGFX Display (Custom Component) ───────────────────────────────────
display:
  - platform: lovyan_verified
    id: main_display
    width: 800
    height: 480
    swap_bytes: false
    update_interval: 0ms

i2c:
  - id: i2c_bus
    sda: 19
    scl: 20
    frequency: 400kHz
    scan: true

touchscreen:
  - platform: gt911
    id: main_touch
    display: main_display
    address: 0x5D
    reset_pin: GPIO38
    # interrupt_pin: GPIO18 (Stick to polling for now as it was confirmed working)
    update_interval: 16ms
    on_touch:
      - lambda: |-
          ESP_LOGI("gt911_touch", "TOUCH Point: x=%d, y=%d", (int)touch.x, (int)touch.y);

# ─── System & Environmental Sensors ──────────────────────────────────────────
sensor:
  - platform: adc
    pin: GPIO1
    name: "Illuminance"
    id: illuminance
    update_interval: 2s
    unit_of_measurement: "%"
    filters:
      - calibrate_linear:
          method: least_squares
          datapoints:
            - 0.0 -> 100.0
            - 3.1 -> 0.0
      - sliding_window_moving_average:
          window_size: 10
          send_every: 1
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2

  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_sig
    update_interval: 30s
    entity_category: "diagnostic"

  - platform: uptime
    name: "Uptime"
    id: sys_uptime
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: internal_temperature
    name: "Internal Temperature"
    id: internal_temp
    update_interval: 60s

# ─── Text Sensors ─────────────────────────────────────────────────────────────
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip

# ─── LVGL UI ─────────────────────────────────────────────────────────────────
lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  update_interval: 0ms
  buffer_size: 25%
  byte_order: little_endian
  bg_color: 0x0e0e0e
  default_font: MONTSERRAT_24
  full_refresh: false
  log_level: WARN
  pages:
    - id: dashboard_page
      on_boot:
        - lambda: |-
            maindashboard_create();
            ESP_LOGI("main", "Dashboard Started");
#        - label:
#            text: ""
#            ... (all old widgets commented out)

time:
  - platform: sntp
    id: sntp_time
    timezone: "IST-2IDT,M3.4.4/26,M10.5.0"


# ─── Intervals ────────────────────────────────────────────────────────────────
interval:
  - interval: 1s
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (now.is_valid()) {
            dashboard_tick(now.hour, now.minute, now.second, now.day_of_month, now.month, now.year, now.day_of_week);
          } else {
            dashboard_tick(-1, -1, -1, -1, -1, -1, -1);
          }

# ─── React SPA web server (port 80) ──────────────────────────────────────────
external_components:
  - source:
      type: local
      path: components
    components: [react_spa, sd_card]
  - source:
      type: local
      path: external_components
    components: [lovyan_verified]

sd_card:
  
react_spa:
  port: 80
