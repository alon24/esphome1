substitutions:
  # Base configuration
  name: "grid-os-s3"
  friendly_name: "GridOS Designer"
  
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    extra_scripts: 
      - ../../../scripts/patch_lvgl.py
      - ../../../scripts/patch_defines.py
    board_build.flash_mode: qio
    board_upload.speed: 921600
  libraries:
    - ArduinoJson
  includes:
    - custom/version_info.h
    - custom/sd_stubs.h
    - custom/system_settings.h
    - custom/grid_config.h
    - custom/actions.h
    - custom/widget_bindings.h
    - custom/ui_helpers.h
    - custom/wifi_setup.h
    - custom/tab_home.h
    - custom/tab_wifi.h
    - custom/tab_wifi_embedded.h
    - custom/tab_sd.h
    - custom/tab_sd_embedded.h
    - custom/tab_settings.h
    - custom/maindashboard.h
    - custom/slideshow.h
    - custom/stb_image.h

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      loop_task_stack_size: 32768
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_VFS_SUPPORT_IO: "y"
      CONFIG_VFS_SUPPORT_DIR: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "65536"
  partitions: partitions.csv

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "GridOS-AP"
    password: "esp32display"

ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

safe_mode:
  disabled: true

logger:
  level: INFO
  baud_rate: 115200
  hardware_uart: UART0

# mqtt:
#   broker: !secret mqtt_broker
#   username: !secret mqtt_username
#   password: !secret mqtt_password
#   id: mqtt_client
#   on_message:
#     - topic: "grid/cmd/nav"
#       then:
#         - lambda: |-
#             ui_navigate_to(x.c_str());

# ─── Backlight (GPIO2) ───────────────────────────────────────────────────────
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO2
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_output
    restore_mode: ALWAYS_ON

# ─── Display (Native RGB Driver) ─────────────────────────────────────────────
display:
  - platform: rpi_dpi_rgb
    id: main_display
    color_order: RGB
    dimensions:
      width: 800
      height: 480
    de_pin: 40
    hsync_pin: 39
    vsync_pin: 41
    pclk_pin: 42
    pclk_frequency: 16MHz
    pclk_inverted: true
    data_pins:
      red: [45, 48, 47, 21, 14]
      green: [5, 6, 7, 15, 16, 4]
      blue: [8, 3, 46, 9, 1]

i2c:
  sda: 19
  scl: 20
  scan: true
  frequency: 400kHz

touchscreen:
  - platform: gt911
    id: main_touch
    display: main_display
    address: 0x5D
    reset_pin: GPIO38

# ─── LVGL UI Engine ──────────────────────────────────────────────────────────
image:
  - file: ./webapp/dist/assets/sd_preview.png
    id: dummy_img
    type: RGB
    transparency: alpha_channel

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  update_interval: 200ms
  buffer_size: 10%
  byte_order: big_endian
  bg_color: 0x0e0e0e
  default_font: MONTSERRAT_24
  # Enable all widgets used in custom C++ dashboard
  widgets:
    - label: { text: "", text_font: MONTSERRAT_12 }
    - label: { text: "", text_font: MONTSERRAT_14 }
    - label: { text: "", text_font: MONTSERRAT_16 }
    - label: { text: "", text_font: MONTSERRAT_18 }
    - label: { text: "", text_font: MONTSERRAT_20 }
    - label: { text: "", text_font: MONTSERRAT_22 }
    - label: { text: "" }
    - button: { widgets: [ { label: { text: "" } } ] }
    - switch: {}
    - slider: {}
    - arc: {}
    - checkbox: {}
    - dropdown: { options: "Opt" }
    - roller: { options: "Opt" }
    - bar: {}
    - image: { src: dummy_img }
  pages:
    - id: dashboard_page
      on_boot:
        - lambda: |-
            #include <lvgl.h>
            ESP_LOGI("DASH", "Registering boot timer...");
            lv_timer_t *t = lv_timer_create([](lv_timer_t *tmr){
                ESP_LOGI("DASH", "Boot timer fired!");
                lv_obj_t *pg = (lv_obj_t*)lv_timer_get_user_data(tmr);
                maindashboard_create(pg);
                lv_timer_del(tmr);
            }, 3000, id(dashboard_page).obj);

esp_littlefs:
  id: littlefs_bridge

time:
  - platform: sntp
    id: sntp_time
    timezone: "IST-2IDT,M3.4.4/26,M10.5.0"

interval:
  - interval: 1s
    then:
      - lambda: |-
          slideshow_tick();
          grid_config_tick();
          auto now = id(sntp_time).now();
          dashboard_tick(now.hour, now.minute, now.second, now.day_of_month, now.month, now.year, now.day_of_week);
          if (now.second % 5 == 0) ESP_LOGI("main", "--- LIVE HEARTBEAT ---");

external_components:
  - source:
      type: local
      path: components
    components: [react_spa, esp_littlefs]

# sd_card is disabled to prevent interrupt depletion and boot conflicts
# sd_card:
#   id: sd_card_comp

react_spa:
  id: my_react_spa
  port: 80
